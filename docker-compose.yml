services:
  tracking_admin:
    build:
      context: ./tracking_admin
      dockerfile: Dockerfile
    container_name: tracking_admin_fe
    ports:
      - "5173:5173"
    volumes:
      - ./tracking_admin:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173

  tracking_customer:
    build:
      context: ./tracking_customer
      dockerfile: Dockerfile
    container_name: tracking_customer_fe
    ports:
      - "5174:5174"
    volumes:
      - ./tracking_customer:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5174